<VirtualHost *:80>
    ServerName www.buenas.lan 
    ServerAlias buenas.lan eq1.buenas.lan
    DocumentRoot /opt/web/buenas.lan/htdocs

    <Directory /opt/web/buenas.lan/htdocs>
        Require all granted        
        DirectoryIndex inicio.html indice.html primeiro.html         
        AllowOverride All
    </Directory>
</VirtualHost>

